                              <span className="text-lg font-bold text-emerald-700">151,800 {t.baht}</span>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* --- VIEW: PERSON --- */}
                  {viewMode === 'person' && !selectedPerson && (
                    <div className="animate-in fade-in">
                      <div className="text-center mb-8">
                        <h2 className="text-2xl font-bold text-slate-800">{t.select_person}</h2>
                        <div className="w-24 h-1 bg-blue-500 mx-auto mt-4 rounded-full"></div>
                      </div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                        {allTeachers.map((teacher, idx) => {
                          const projectCount = projectsData.filter(p => p.owners.some(o => o.th === teacher.th)).length;
                          return (
                            <button
                              key={idx}
                              onClick={() => setSelectedPerson(teacher)}
                              className="group relative flex flex-col items-center p-6 bg-slate-50 border border-slate-200 rounded-2xl hover:bg-blue-50 hover:border-blue-300 transition-all duration-300 transform hover:-translate-y-2 hover:shadow-lg"
                            >
                              <div className="w-16 h-16 bg-blue-100 text-blue-800 rounded-full flex items-center justify-center mb-4 group-hover:bg-blue-600 group-hover:text-white transition-colors duration-300">
                                <UserCheck className="w-8 h-8" />
                              </div>
                              <span className="font-medium text-slate-700 group-hover:text-blue-900 text-center text-sm md:text-base">
                                {teacher[lang]}
                              </span>
                              
                              <span className="absolute top-3 right-3 bg-white border border-slate-200 text-slate-500 text-xs font-bold px-2 py-1 rounded-full shadow-sm group-hover:border-blue-300 group-hover:text-blue-600">
                                {projectCount} โครงการ
                              </span>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* --- VIEW: DEPARTMENT --- */}
                  {viewMode === 'dept' && !selectedDept && (
                    <div className="animate-in fade-in">
                       <div className="text-center mb-8">
                        <h2 className="text-2xl font-bold text-slate-800">{t.select_dept}</h2>
                        <div className="w-24 h-1 bg-blue-500 mx-auto mt-4 rounded-full"></div>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {allDepts.map((dept, idx) => (
                          <button
                            key={idx}
                            onClick={() => setSelectedDept(dept)}
                            className="flex items-center gap-4 p-6 bg-gradient-to-r from-slate-50 to-white border border-slate-200 rounded-2xl hover:border-blue-400 transition-all duration-300 transform hover:-translate-y-1 hover:shadow-md text-left group"
                          >
                            <div className="p-4 bg-blue-100 text-blue-700 rounded-2xl group-hover:bg-blue-600 group-hover:text-white transition-colors duration-300">
                              {getDeptIcon(dept.th)}
                            </div>
                            <div className="flex-1">
                              <h3 className="text-lg font-bold text-slate-800 group-hover:text-blue-800">{dept[lang]}</h3>
                              <p className="text-sm text-slate-500 mt-1">
                                 {t.total_projects}: {projectsData.filter(p => p.department.th === dept.th).length}
                              </p>
                            </div>
                            <ChevronRight className="w-6 h-6 text-slate-400 group-hover:text-blue-600 transform group-hover:translate-x-1 transition-all" />
                          </button>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* --- DETAIL VIEW (SHOW PROJECTS) --- */}
                  {((viewMode === 'person' && selectedPerson) || (viewMode === 'dept' && selectedDept)) && (
                    <div className="animate-in slide-in-from-right-8">
                      
                      <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 pb-6 border-b border-slate-200 gap-4">
                        <div>
                          <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-3">
                            {viewMode === 'person' ? <UserCheck className="w-8 h-8 text-blue-600 hidden sm:block" /> : getDeptIcon(selectedDept?.th)}
                            {viewMode === 'person' ? t.projects_of : t.projects_in}: 
                            <span className="text-blue-700 ml-2">
                              {viewMode === 'person' ? selectedPerson[lang] : selectedDept[lang]}
                            </span>
                          </h2>
                        </div>
                        <button 
                          onClick={resetSelection}
                          className="flex items-center gap-2 px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-xl transition-all hover:-translate-x-1 whitespace-nowrap"
                        >
                          <ChevronRight className="w-5 h-5 rotate-180" />
                          {t.back}
                        </button>
                      </div>

                      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {displayedProjects.map((project) => (
                          <div key={project.id} className="bg-white border-2 border-slate-100 rounded-2xl p-6 hover:border-blue-300 hover:shadow-xl transition-all duration-300 flex flex-col h-full relative overflow-hidden group">
                            
                            <div className="absolute -right-10 -top-10 w-32 h-32 bg-blue-50 rounded-full opacity-50 group-hover:scale-150 transition-transform duration-700 ease-out z-0"></div>

                            <div className="absolute top-4 right-4 flex items-center gap-1.5 px-3 py-1.5 bg-amber-50 text-amber-700 text-sm font-bold rounded-lg border border-amber-200 shadow-sm z-20 transition-all hover:bg-amber-100" title="หน้าอ้างอิงในเอกสารแผนปฏิบัติการ">
                              <Bookmark className="w-4 h-4" />
                              {t.page_ref} {project.page}
                            </div>

                            <div className="relative z-10 flex-grow pt-2">
                              <div className="inline-flex items-center gap-1.5 px-3 py-1 bg-blue-50 text-blue-700 text-xs font-bold rounded-lg mb-4 uppercase tracking-wide">
                                {getDeptIcon(project.department.th)}
                                {project.department[lang]}
                              </div>

                              <h3 className="text-xl font-bold text-slate-800 mb-4 leading-snug pr-24">
                                {project.name[lang]}
                              </h3>

                              <div className="space-y-3 mb-6">
                                <div className="flex items-start gap-3">
                                  <Target className="w-5 h-5 text-emerald-500 mt-0.5 flex-shrink-0" />
                                  <div>
                                    <span className="text-sm font-semibold text-slate-500 block">{t.target}</span>
                                    <span className="text-slate-700">{project.target[lang]}</span>
                                  </div>
                                </div>
                                
                                <div className="flex items-start gap-3">
                                  <FileText className="w-5 h-5 text-amber-500 mt-0.5 flex-shrink-0" />
                                  <div>
                                    <span className="text-sm font-semibold text-slate-500 block">{t.details}</span>
                                    <span className="text-slate-700 text-sm leading-relaxed">{project.details[lang]}</span>
                                  </div>
                                </div>

                                <div className="flex items-start gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100 mt-4">
                                  <Users className="w-5 h-5 text-indigo-500 mt-0.5 flex-shrink-0" />
                                  <div>
                                    <span className="text-sm font-semibold text-slate-500 block">{t.owners}</span>
                                    <div className="flex flex-wrap gap-2 mt-1">
                                      {project.owners.map((owner, idx) => (
                                        <span 
                                          key={idx} 
                                          className={`text-sm px-2.5 py-1 rounded-md ${
                                            (viewMode === 'person' && selectedPerson && owner.th === selectedPerson.th)
                                              ? 'bg-indigo-100 text-indigo-800 font-bold border border-indigo-200 shadow-sm' 
                                              : 'bg-white text-slate-600 border border-slate-200'
                                          }`}
                                        >
                                          {owner[lang]}
                                        </span>
                                      ))}
                                    </div>
                                  </div>
                                </div>
                              </div>
                            </div>

                            <div className="relative z-10 pt-4 border-t border-slate-100 flex items-center justify-between mt-auto">
                              <span className="text-sm font-semibold text-slate-500">{t.budget}</span>
                              <span className="text-lg font-bold text-blue-700 bg-blue-50 px-4 py-1.5 rounded-lg border border-blue-100">
                                {project.budget.toLocaleString()} {t.baht}
                              </span>
                            </div>

                          </div>
                        ))}
                      </div>
                      
                      {displayedProjects.length === 0 && (
                        <div className="text-center py-20 text-slate-400">
                          <FileText className="w-16 h-16 mx-auto mb-4 opacity-50" />
                          <p className="text-lg">ไม่มีข้อมูลโครงการในหมวดหมู่นี้</p>
                        </div>
                      )}
                    </div>
                  )}

                </div>
              </main>

              {/* FOOTER */}
              <footer className="bg-slate-900 text-slate-400 py-10 mt-12">
                <div className="max-w-7xl mx-auto px-4 text-center">
                  <p className="text-sm font-medium tracking-wider mb-2">
                    {t.footer_copyright}
                  </p>
                  <div className="w-16 h-0.5 bg-blue-500 mx-auto my-4 opacity-50"></div>
                  <p className="text-xs md:text-sm text-slate-500">
                    {t.footer_dev}
                  </p>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
